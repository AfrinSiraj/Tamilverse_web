{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tamilverse Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body{
        margin:0;
        height:100vh;
        background:#2f5f5b;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:'Segoe UI',sans-serif;
        color:white;
    }

    .container{
        width:1100px;
        display:flex;
        justify-content:center;
        align-items:center;
        gap:120px;
    }

    .logo-box{
        width:420px;
        height:420px;
        background:rgba(255,255,255,0.12);
        backdrop-filter:blur(14px);
        border-radius:32px;
        display:flex;
        flex-direction:column;
        align-items:center;
        padding-top:45px;
        box-shadow:0 25px 50px rgba(0,0,0,0.45);
        text-align:center;
    }

    .logo-square{
        width:200px;
        height:200px;
        background:#2f5f5b;
        border-radius:24px;
        display:flex;
        justify-content:center;
        align-items:center;
        box-shadow:
            inset 0 0 0 2px rgba(255,255,255,0.12),
            0 18px 40px rgba(0,0,0,0.45);
    }

    .logo-square img{
        width:140px;
        height:140px;
        object-fit:contain;
    }

    .brand{
        margin-top:36px;
    }

    .brand h1{
        margin:0;
        font-size:42px;
        font-weight:700;
    }

    .brand p{
        margin-top:10px;
        opacity:0.85;
        font-size:15px;
    }

    .login-box{
        width:420px;
        background:rgba(255,255,255,0.18);
        backdrop-filter:blur(14px);
        padding:44px;
        border-radius:32px;
        box-shadow:0 25px 50px rgba(0,0,0,0.45);
        text-align:center;
    }

    .login-box h2{
        margin-bottom:30px;
        font-size:30px;
    }

    .login-box input{
        width:100%;
        padding:16px;
        margin-bottom:22px;
        border:none;
        border-radius:14px;
        outline:none;
        font-size:15px;
    }

    .login-box button{
        width:100%;
        padding:16px;
        border:none;
        border-radius:16px;
        background:#e3b46b;
        color:#1f3f3d;
        font-size:18px;
        font-weight:600;
        cursor:pointer;
    }

    .login-box button:hover{
        background:#d6a85f;
    }

    .register{
        margin-top:24px;
        font-size:14px;
    }

    .register a{
        color:#ffd88a;
        text-decoration:none;
        font-weight:600;
    }

    .register a:hover{
        text-decoration:underline;
    }
</style>
</head>

<body>

<div class="container">

    <!-- LEFT LOGO BOX -->
    <div class="logo-box">
        <div class="logo-square">
            <img src="{% static 'images/image.png' %}" alt="Tamilverse Logo">
        </div>

        <div class="brand">
            <h1>Tamilverse</h1>
            <p>Explore • Discover • Experience</p>
        </div>
    </div>

    <!-- RIGHT LOGIN BOX -->
    <div class="login-box">
        <h2>Welcome Back</h2>

        <!-- 🔥 FORM START -->
        <form onsubmit="loginUser(event)">
            {% csrf_token %}
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
        <!-- 🔥 FORM END -->

        <div class="register">
            Don’t have an account?
            <a href="{% url 'accounts:register' %}">Register / Sign up</a>
        </div>
    </div>

</div>

<script>
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return '';
}

function loginUser(event){
    event.preventDefault();
    const username = document.querySelector("input[type='text']").value;
    const password = document.querySelector("input[type='password']").value;
    fetch("{% url 'accounts:login' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: new URLSearchParams({username, password})
    }).then((res) => {
        if (res.redirected) {
            window.location.href = res.url;
        } else {
            window.location.reload();
        }
    });
}
</script>
</body>
</html>
